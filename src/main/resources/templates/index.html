<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Tombojava Tombola</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        .container { max-width: 720px; margin: 0 auto; }
        .primary { background: #1e40af; color: #fff; border: 0; padding: .75rem 1rem; border-radius: 8px; cursor: pointer; }
        dialog { border: 0; border-radius: 10px; padding: 1rem; width: 360px; }
        dialog::backdrop { background: rgba(0, 0, 0, 0.35); }
        label { display: block; margin-top: .75rem; font-size: .9rem; }
        input { width: 100%; box-sizing: border-box; padding: .55rem; margin-top: .2rem; }
        .actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem; }
        .secondary { background: #e5e7eb; color: #111827; border: 0; padding: .6rem .8rem; border-radius: 8px; cursor: pointer; }
        .progress-wrap { margin-top: 1.25rem; display: none; }
        progress { width: 100%; height: 20px; }
        .status { margin-top: .5rem; color: #1f2937; }
        .download { margin-top: .8rem; }
        .game-wrap { margin-top: 1.5rem; display: none; }
        .board { display: grid; grid-template-columns: repeat(10, minmax(0, 1fr)); gap: .35rem; margin-top: .75rem; }
        .board-btn { padding: .45rem 0; border: 1px solid #9ca3af; background: #fff; border-radius: 6px; cursor: pointer; }
        .board-btn.is-drawn { background: #f59e0b; color: #111827; border-color: #d97706; font-weight: bold; }
        .verify-controls { display: flex; gap: .5rem; margin-top: 1rem; align-items: end; }
        .verify-controls .field { flex: 0 0 180px; }
        .cards-wrap { margin-top: 1rem; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: .75rem; }
        .card { border: 1px solid #d1d5db; border-radius: 8px; padding: .5rem; }
        .card-title { font-size: .9rem; margin-bottom: .4rem; color: #374151; }
        .card-grid { border-collapse: collapse; width: 100%; table-layout: fixed; }
        .card-grid td { border: 1px solid #d1d5db; text-align: center; height: 28px; font-size: .9rem; }
        .card-grid td.drawn { background: #fde68a; font-weight: bold; }
        .verify-message { margin-top: .5rem; color: #374151; }
    </style>
</head>
<body>
<div class="container">
    <h1>Tombojava Tombola</h1>
    <p>Genera il PDF delle cartelle con processo in background.</p>
    <button id="openModalBtn" class="primary" type="button">Genera cartelle</button>

    <div id="progressWrap" class="progress-wrap">
        <progress id="jobProgress" value="0" max="100"></progress>
        <div id="jobStatus" class="status">In attesa...</div>
        <div id="downloadWrap" class="download"></div>
    </div>

    <div id="gameWrap" class="game-wrap">
        <h2>Tabellone</h2>
        <p>Clicca i numeri estratti per marcarli.</p>
        <div id="numbersBoard" class="board"></div>

        <div class="verify-controls">
            <div class="field">
                <label for="verifySeriesNumber">Numero serie da verificare</label>
                <input id="verifySeriesNumber" type="number" min="1" value="1" required>
            </div>
            <button id="verifySeriesBtn" class="primary" type="button">Verifica</button>
        </div>

        <div id="verifyMessage" class="verify-message"></div>
        <div id="verifyResult" class="cards-wrap"></div>
    </div>
</div>

<dialog id="generateDialog">
    <form id="generateForm" method="dialog">
        <h3>Parametri generazione</h3>
        <label for="seriesCount">Numero serie</label>
        <input id="seriesCount" name="seriesCount" type="number" min="1" value="1" required>

        <label for="seed">Seed (opzionale)</label>
        <input id="seed" name="seed" type="number" step="1" placeholder="es. 123456789">

        <label for="maxWaitSeconds">Tempo massimo attesa (secondi)</label>
        <input id="maxWaitSeconds" name="maxWaitSeconds" type="number" min="1" value="30" required>

        <div class="actions">
            <button id="cancelBtn" type="button" class="secondary">Annulla</button>
            <button type="submit" class="primary">Avvia</button>
        </div>
    </form>
</dialog>

<script src="/js/job-polling.js"></script>
</body>
</html>
